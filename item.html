<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegraph Embed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .embed-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="embed-container">
    <!-- Replace the URL inside the src attribute with your target telegra.ph post -->
    <iframe src="https://telegra.ph/Apartment-cleaning-service-Outering-Road-05-20" title="Telegraph Post"></iframe>
</div>

</body>
</html>
